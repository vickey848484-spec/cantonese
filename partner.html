<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>揾你嘅语伴 · 識讲粤语</title>
  <link rel="stylesheet" href="css/style.css?v=20260607b">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container container-wide">
    <section class="section">
      <div class="center mb-3">
        <h1 class="display"><i data-icon="handshake"></i> 揾你嘅粤语语伴</h1>
        <p class="muted mt-1" id="subtitle">按你嘅等级筛嘅 3-5 位</p>
      </div>

      <div class="card-flat mb-3 hide" id="no-result">
        <p>你未测试过 <a href="test.html" style="color: var(--blue);">→ 去测一测</a></p>
      </div>

      <div id="partner-list" class="grid grid-2"></div>

      <div class="center mt-3">
        <a class="btn btn-ghost" href="result.html">← 睇返结果</a>
        <a class="btn btn-primary" href="course.html">下一步：揾课 →</a>
      </div>
    </section>
  </main>

  <footer class="footer">識讲粤语 · 由 Vickey 老师主理</footer>

  <script src="js/common.js?v=20260607b"></script>
  <script src="js/labeler.js?v=20260607b"></script>
  <script>
    Cantonese.initTheme();
    Cantonese.injectThemeToggle();
    Cantonese.injectTopbar('partner');
    Cantonese.initIcons();
    Cantonese.initScrollReveal();

    (async function () {
      try {
        const result = Cantonese.Store.get(Cantonese.Store.KEYS.result);
        if (!result) {
          document.getElementById('no-result').classList.remove('hide');
          document.getElementById('partner-list').innerHTML = '';
          return;
        }

        const { level, mbtiCode } = result;
        let mbtiType = null;
        try {
          await Labeller.load();
          mbtiType = Labeller.resolve(mbtiCode);
        } catch (e) {
          console.warn('[partner] labels.json 加载失败，用 fallback', e);
        }
        const matchTags = (mbtiType && mbtiType.matchTags) || [];

        const { partners } = await Cantonese.loadJSON('data/partners.json');

        const scored = partners.map(p => {
          let score = 0;
          if (p.level === level.short) score += 10;
          if (Array.isArray(p.tags)) {
            p.tags.forEach(t => { if (matchTags.includes(t)) score += 3; });
          }
          return { ...p, _score: score };
        }).sort((a, b) => b._score - a._score).slice(0, 5);

        document.getElementById('subtitle').textContent =
          `按你嘅「${level.name}」筛嘅 ${scored.length} 位${mbtiType ? '（已按性格匹配）' : ''}`;

        const host = document.getElementById('partner-list');
        host.innerHTML = scored.map(p => {
          return `
          <div class="partner-card">
            <div class="row" style="gap:14px; align-items: center;">
              <span class="partner-avatar">
                <span class="partner-avatar-emoji">${p.icon || '🧑'}</span>
              </span>
              <div>
                <div class="partner-name">${p.name}</div>
                <div class="partner-meta">${p.gender} · ${p.age} · ${p.region}</div>
              </div>
            </div>
            <div class="row" style="gap:6px;">
              <span class="tag tag-pink">${p.level}</span>
              ${(p.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
            <p class="partner-intro">${p.intro}</p>
            <div class="text-sm muted">${Cantonese.icon('envelope-simple')} ${p.contact}</div>
          </div>
        `}).join('');
      } catch (e) {
        console.error('[partner] error:', e);
        document.getElementById('no-result').classList.remove('hide');
        document.getElementById('no-result').innerHTML =
          `<p style="color: var(--pink); margin-bottom: 8px;">出咗错</p>
           <p class="text-sm muted" style="margin-bottom: 16px;">${e.message}</p>
           <a class="btn btn-ghost" href="test.html">返去重测</a>`;
      }
    })();
  </script>
</body>
</html>
