<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>粤语学习 Q&A · 识讲粤语</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    .qa-search {
      width: 100%;
      padding: 16px 20px;
      font-size: 16px;
      font-weight: 700;
      background: var(--bg-soft);
      color: var(--text);
      border: 2px solid var(--border);
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .qa-search:focus { outline: none; border-color: var(--yellow); }
    .qa-search::placeholder { color: var(--text-soft); font-weight: 400; }

    .qa-category { margin-bottom: 32px; }
    .qa-cat-title {
      font-size: 22px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .qa-cat-title i { color: var(--blue); }
    details.qa-item summary {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    details.qa-item {
      background: var(--card);
      color: var(--card-text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    details.qa-item:hover { border-color: var(--border-strong); }
    details.qa-item[open] { border-color: var(--yellow); }
    details.qa-item summary {
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
    }
    details.qa-item summary::-webkit-details-marker { display: none; }
    details.qa-item summary::before {
      content: '+';
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: var(--yellow);
      color: #0a0a0a;
      border-radius: 4px;
      font-weight: 900;
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }
    details.qa-item[open] summary::before { content: '−'; }
    details.qa-item .qa-q-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--yellow);
      color: #0a0a0a;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    details.qa-item .qa-q-text { flex: 1; }
    details.qa-item .qa-a {
      margin-top: 12px;
      padding-left: 36px;
      color: var(--text-soft);
      line-height: 1.7;
      font-size: 15px;
    }

    .contact-card {
      background: var(--card);
      color: var(--card-text);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-top: 32px;
    }
    .contact-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 20px;
    }
    @media (min-width: 640px) {
      .contact-row { grid-template-columns: repeat(3, 1fr); }
    }
    .contact-item {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }
    .contact-item .icon-wrap {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--yellow);
      color: #0a0a0a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }
    .contact-item .icon-wrap i { font-size: 28px; color: #0a0a0a; }
    .contact-item .label { font-size: 13px; color: var(--text-soft); margin-bottom: 4px; }
    .contact-item .value { font-weight: 900; font-size: 16px; }
    .contact-item .copy-btn {
      margin-top: 12px;
      padding: 6px 14px;
      font-size: 12px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      cursor: pointer;
    }
    .contact-item .copy-btn:hover { background: var(--yellow); color: #0a0a0a; border-color: var(--yellow); }
  </style>
</head>
<body>
  <main class="container">
    <section class="section">
      <div class="center mb-3">
        <h1 class="display">学习 Q&A + 客服</h1>
        <p class="muted mt-1">唔怕问题多，怕你唔问</p>
      </div>

      <input class="qa-search" type="search" id="qa-filter" placeholder="搜问题：例如「发音」「多久」「退款」…">

      <div id="qa-list"></div>

      <div class="contact-card">
        <h2 class="display" style="font-size: 22px;">📞 联系客服</h2>
        <p class="muted text-sm mt-1">3 种方式搵到 Vickey 老师</p>

        <div class="contact-row" id="contact-rows">
          <!-- JS 渲染 -->
        </div>

        <div class="mt-3" style="background: var(--bg-soft); padding: 16px; border-radius: 12px; border: 1px solid var(--border);">
          <div class="text-sm bold"><i class="ph ph-clock"></i> 客服时间</div>
          <p class="muted text-sm mt-1" id="contact-hours">—</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">识讲粤语 · 由 Vickey 老师主理</footer>

  <script src="js/common.js"></script>
  <script>
    Cantonese.initTheme();
    Cantonese.injectThemeToggle();
    Cantonese.injectTopbar('qa');
    Cantonese.initIcons();
    Cantonese.initScrollReveal();

    (async function () {
      try {
        const data = await Cantonese.loadJSON('data/qa.json');
        await Cantonese.renderQA(document, data);

        // 客服区
        const c = data.contact;
        const rows = document.getElementById('contact-rows');
        rows.innerHTML = `
          <div class="contact-item">
            <div class="icon-wrap">${Cantonese.icon('chat-circle-dots')}</div>
            <div class="label">${c.wechat.label || '微信咨询'}</div>
            <div class="value">${c.wechat.id}</div>
            <button class="copy-btn" data-copy="${c.wechat.id}">复制微信号</button>
          </div>
          <div class="contact-item">
            <div class="icon-wrap">${Cantonese.icon('envelope')}</div>
            <div class="label">邮件咨询</div>
            <div class="value" style="font-size: 14px; word-break: break-all;">${c.email}</div>
            <button class="copy-btn" data-copy="${c.email}">复制邮箱</button>
          </div>
          <div class="contact-item">
            <div class="icon-wrap">${Cantonese.icon('chat-circle-dots')}</div>
            <div class="label">${c.wechat.name || '老师'}</div>
            <div class="value" style="font-size: 13px; line-height: 1.5;">${c.phone || '微信最及时'}</div>
            <a class="copy-btn" style="text-decoration: none; display: inline-block;" href="mailto:${c.email}">发邮件</a>
          </div>
        `;

        // 复制按钮
        rows.querySelectorAll('.copy-btn[data-copy]').forEach(btn => {
          btn.addEventListener('click', () => {
            const txt = btn.getAttribute('data-copy');
            Cantonese.copyToClipboard(txt).then(() => {
              const orig = btn.textContent;
              btn.textContent = '已复制 ✓';
              setTimeout(() => { btn.textContent = orig; }, 1500);
            });
          });
        });

        document.getElementById('contact-hours').textContent =
          `${c.hours} · ${c.phone || ''}`;
      } catch (e) {
        console.error('[qa] error:', e);
        document.getElementById('qa-list').innerHTML =
          `<p style="color: var(--pink);">加载失败：${e.message}</p>`;
      }
    })();
  </script>
</body>
</html>
