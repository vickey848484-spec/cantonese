<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你的粵語結果 · 識講粵語</title>
  <link rel="stylesheet" href="css/style.css?v=20260607b">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <section class="section center fade-in" id="loading">
      <p class="muted"><i data-icon="hourglass"></i> 算緊你嘅結果...</p>
    </section>

    <section class="section hide" id="result-wrap">
      <div class="center mb-3">
        <div class="muted text-sm">你的粵語等級</div>
        <div class="level-badge" id="level-badge">入門</div>
        <h1 class="display" style="color: var(--yellow);" id="level-name">聽唔明仔</h1>
        <p class="muted" id="level-score">10 題答對 5 題</p>
      </div>

      <div class="card mt-3">
        <div class="muted text-sm">你的粵語人格 · 4 維 16 型</div>
        <div class="row mt-1" style="gap:12px; align-items: center;">
          <i style="font-size: 64px; line-height: 1; color: var(--blue);" id="mbti-emoji" data-icon="sparkle"></i>
          <div>
            <h2 class="display" style="margin:0; font-size: 28px;" id="mbti-code">SPWI</h2>
            <div class="text-sm muted" id="mbti-title">速成·聽講·獨狼·學院派</div>
          </div>
        </div>
        <p class="mt-2" id="mbti-tagline"></p>
        <p class="muted mt-2" id="mbti-desc"></p>
        <div class="mt-3">
          <div class="muted text-sm">4 維拆解</div>
          <div id="mbti-dims" class="row mt-1" style="gap: 8px;"></div>
        </div>
        <div class="mt-3" style="background: var(--bg-soft); padding: 16px; border-radius: 12px;">
          <div class="muted text-sm"><i data-icon="lightbulb"></i> 學習建議</div>
          <p class="mt-1" id="mbti-advice"></p>
        </div>
      </div>

      <div class="card mt-3">
        <h3 class="display" style="font-size: 22px;"><i data-icon="megaphone"></i> 分享俾朋友</h3>
        <p class="muted text-sm mt-1">選個風格一鍵複製 + 生成專屬邀請海報</p>

        <div class="text-sm bold mt-3" style="color: var(--text-soft);">選個文案風格：</div>
        <div class="grid mt-2" style="grid-template-columns: 1fr 1fr; gap: 8px;">
          <button class="btn btn-primary btn-block" data-share="xiaohongshu">📕 小紅書</button>
          <button class="btn btn-blue btn-block" data-share="wechat">💬 微信對話</button>
          <button class="btn btn-ghost btn-block" data-share="moments">🌟 朋友圈</button>
          <button class="btn btn-ghost btn-block" data-share="simple">🔗 簡潔</button>
        </div>

        <div class="row mt-3" style="gap: 8px;">
          <button class="btn btn-ghost btn-block" id="share-link">🔗 複製專屬鏈接</button>
          <button class="btn btn-primary btn-block" id="share-poster">🎨 生成專屬海報</button>
        </div>
      </div>

      <div class="card mt-3">
        <h3 class="display" style="font-size: 22px;"><i data-icon="clock"></i> 你的學習時長預測</h3>
        <p class="muted text-sm mt-1">按你每天學 <strong id="daily-mins">30</strong> 分鐘算</p>

        <div class="stack mt-3">
          <div class="row" style="justify-content: space-between; align-items: center;">
            <div>
              <div class="bold">入門 <span class="muted text-sm">· 你嘅位置</span></div>
              <div class="text-sm muted" id="t-entry">≈ 0 個月</div>
            </div>
            <span class="badge badge-blue">DONE</span>
          </div>
          <div class="row" style="justify-content: space-between; align-items: center;">
            <div>
              <div class="bold">進階</div>
              <div class="text-sm muted" id="t-mid">≈ 0 個月</div>
            </div>
            <span class="badge" id="b-mid">目標</span>
          </div>
          <div class="row" style="justify-content: space-between; align-items: center;">
            <div>
              <div class="bold">高階</div>
              <div class="text-sm muted" id="t-high">≈ 0 個月</div>
            </div>
            <span class="badge badge-purple" id="b-high">遠期</span>
          </div>
        </div>
      </div>

      <div class="card mt-3">
        <h3 class="display" style="font-size: 22px;"><i data-icon="share-network"></i> 分享你的結果</h3>
        <p class="muted text-sm mt-1">發到小紅書/朋友圈，讓朋友也測一測</p>
        <div id="share-card-host" class="share-card-wrap"></div>
      </div>

      <div class="stack mt-3">
        <a class="btn btn-blue btn-lg btn-block" href="partner.html"><i data-icon="handshake"></i> 揾我嘅語伴</a>
        <a class="btn btn-primary btn-lg btn-block" href="course.html"><i data-icon="book-open"></i> 揾啱我嘅課</a>
        <a class="btn btn-ghost btn-lg btn-block" href="signup.html"><i data-icon="envelope"></i> 留郵箱 · 1/3/6 月提醒我自測</a>
        <a class="btn btn-ghost btn-block" href="test.html?restart=1"><i data-icon="arrow-counter-clockwise"></i> 重新測一次</a>
      </div>
    </section>
  </main>

  <footer class="footer">
    識講粵語 · 由 Vickey 老師主理
  </footer>

  <script src="js/common.js?v=20260607f"></script>
  <script src="js/calc.js?v=20260607f"></script>
  <script src="js/labeler.js?v=20260607f"></script>
  <script src="js/share.js?v=20260607f"></script>
  <script>
    Cantonese.initTheme();
    Cantonese.injectThemeToggle();
    Cantonese.injectTopbar('test');
    Cantonese.initIcons();
    Cantonese.initScrollReveal();

    (async function () {
      try {
        const result = Cantonese.Store.get(Cantonese.Store.KEYS.result);
        if (!result || !result.level) {
          location.href = 'test.html';
          return;
        }

        await Labeller.load();

        // 用最新字母映射從 quiz state 重算 mbtiCode（修 localStorage 舊數據）
        const DIMS = { speed: ['S', 'M'], learn: ['P', 'T'], social: ['T', 'W'], style: ['I', 'E'] };
        const quizState = Cantonese.Store.get(Cantonese.Store.KEYS.quiz);
        if (quizState && Array.isArray(quizState.mbtiAnswers) && quizState.mbtiAnswers.length === 4) {
          const picks = { speed: 0, learn: 0, social: 0, style: 0 };
          quizState.mbtiAnswers.forEach((ans, i) => {
            const dim = ['speed', 'learn', 'social', 'style'][i];
            if (ans === 0 || ans === 1) picks[dim] = ans;
          });
          const newCode = DIMS.speed[picks.speed] + DIMS.learn[picks.learn] +
                          DIMS.social[picks.social] + DIMS.style[picks.style];
          if (newCode && newCode !== result.mbtiCode) {
            result.mbtiCode = newCode;
            Cantonese.Store.set(Cantonese.Store.KEYS.result, result);
          }
        }

        const { level, levelScore, levelTotal, mbtiCode, user } = result;
        let mbtiType = Labeller.resolve(mbtiCode);

        if (!mbtiType) {
          // 實在找不到時降級到 SPTI（不再顯示"解析失敗"）
          mbtiType = Labeller.resolve('SPTI') || { title: '粵語學習者', tagline: '', desc: '', icon: 'sparkle', matchTags: [] };
        }

        const badge = document.getElementById('level-badge');
        badge.textContent = level.short;
        badge.classList.add(level.cls);
        document.getElementById('level-name').textContent = level.name;
        document.getElementById('level-score').textContent =
          `${levelTotal} 題答對 ${levelScore} 題`;

        document.getElementById('mbti-emoji').innerHTML = Cantonese.icon(mbtiType.icon || 'sparkle');
        document.getElementById('mbti-code').textContent = mbtiCode;
        document.getElementById('mbti-title').textContent = mbtiType.title;
        document.getElementById('mbti-tagline').textContent = mbtiType.tagline;
        document.getElementById('mbti-desc').textContent = mbtiType.desc;
        document.getElementById('mbti-advice').textContent = mbtiType.advice;

        const dimsHost = document.getElementById('mbti-dims');
        const dims = Labeller.dimensionsOf(mbtiCode);
        dimsHost.innerHTML = dims.map(d =>
          `<span class="tag tag-blue">${d.label}</span>`
        ).join('');

        const t = Calc.estimate(user);
        document.getElementById('daily-mins').textContent = user.minutes;
        const lvlMap = { entry: 't-entry', mid: 't-mid', high: 't-high' };
        const bMap = { mid: 'b-mid', high: 'b-high' };
        ['entry','mid','high'].forEach(k => {
          document.getElementById(lvlMap[k]).textContent =
            `≈ ${t[k].months} 個月 · ${t[k].days} 天`;
        });
        if (level.key === 'mid') {
          document.getElementById(bMap.mid).textContent = '已達成';
          document.getElementById(bMap.mid).classList.remove('badge');
          document.getElementById(bMap.mid).classList.add('badge', 'badge-blue');
        }
        if (level.key === 'high') {
          document.getElementById(bMap.mid).textContent = '已達成';
          document.getElementById(bMap.high).textContent = '已達成';
          document.getElementById(bMap.mid).className = 'badge badge-blue';
          document.getElementById(bMap.high).className = 'badge badge-blue';
        }

        Share.renderCard({
          container: '#share-card-host',
          level, mbtiType, mbtiCode,
        });

        // 分享按鈕（4 模板 + 鏈接 + 海報）
        const ref = Cantonese.getReferralCode();
        const safeType = mbtiType || { title: '粵語學習者', tagline: '', desc: '' };
        document.querySelectorAll('[data-share]').forEach(btn => {
          btn.addEventListener('click', () => {
            const txt = Cantonese.SHARE_TEMPLATES[btn.dataset.share](mbtiCode, safeType, ref);
            Cantonese.copyToClipboard(txt).then(() => Cantonese.flashShare(btn, '已複製 ✓'));
          });
        });
        document.getElementById('share-link').addEventListener('click', () => {
          const link = `${location.origin}/test.html?ref=${ref}`;
          Cantonese.copyToClipboard(link).then(() =>
            Cantonese.flashShare(document.getElementById('share-link'), '已複製 ✓')
          );
        });
        document.getElementById('share-poster').addEventListener('click', () => {
          Share.downloadPoster({ mbtiCode, mbtiType: safeType, level, ref });
        });

        document.getElementById('loading').classList.add('hide');
        document.getElementById('result-wrap').classList.remove('hide');

        Cantonese.confetti(document.body, 50);
      } catch (e) {
        console.error('[result] error:', e);
        document.getElementById('loading').innerHTML =
          `<div class="center"><p style="color: var(--pink); margin-bottom: 8px;">出咗錯</p>
           <p class="text-sm muted" style="margin-bottom: 16px;">${e.message}</p>
           <a class="btn btn-ghost" href="test.html">返去重測</a></div>`;
      }
    })();
  </script>
</body>
</html>
