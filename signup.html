<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留郵箱 · 1/3/6 月提醒 · 識講粵語</title>
  <link rel="stylesheet" href="css/style.css?v=20260607b">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <section class="section">
      <div class="center mb-3">
        <h1 class="display"><i data-icon="envelope"></i> 留個聯繫方式</h1>
        <p class="muted mt-1">學咗 1 / 3 / 6 個月，我哋會自動提醒你重新自測<br>順便睇下你升級咗未 🎉</p>
      </div>

      <div class="card-flat mb-3 hide" id="no-result">
        <p>你未測試過 <a href="test.html" style="color: var(--blue);">→ 去測一測</a></p>
      </div>

      <div class="card" id="form-wrap">
        <div class="center mb-3">
          <div class="muted text-sm">你嘅測試結果</div>
          <div class="level-badge" id="level-badge">入門</div>
          <div class="bold mt-1" id="level-name">聽唔明仔</div>
          <div class="text-sm muted" id="mbti-summary">SPWI · 速成·聽講·獨狼·學院派</div>
        </div>

        <form id="signup-form" class="stack">
          <div class="field">
            <label>郵箱 *</label>
            <input class="input" type="email" name="email" required placeholder="you@example.com">
            <div class="text-sm muted">用於 1/3/6 月推送提醒</div>
          </div>

          <div class="field">
            <label>微信號 *</label>
            <input class="input" type="text" name="wechat" required placeholder="必填，方便老師加你回訪">
          </div>

          <div class="field">
            <label>開始學習日期 *</label>
            <input class="input" type="date" name="startDate" id="startDate" required>
            <div class="text-sm muted">默認今天，可改</div>
          </div>

          <label class="checkbox">
            <input type="checkbox" name="agree" required>
            <span>我同意 Vickey 老師用上面嘅聯繫方式發推送（1/3/6 個月 + 重要通知），可以隨時退訂。</span>
          </label>

          <button class="btn btn-primary btn-lg btn-block" type="submit"><i data-icon="rocket"></i> 鎖定提醒</button>
        </form>
      </div>

      <div class="card hide center" id="success">
        <i data-icon="confetti" style="font-size: 64px; color: var(--yellow);"></i>
        <h2 class="display mt-2">搞掂！</h2>
        <p class="mt-2 muted" id="success-msg">已加入提醒名單，到期會自動發郵件俾你。</p>
        <div class="row mt-3 center" style="justify-content: center;">
          <a class="btn btn-ghost" href="result.html">睇返結果</a>
          <a class="btn btn-primary" href="course.html">揾課 →</a>
        </div>
      </div>

      <div class="card-flat mt-3">
        <div class="text-sm bold"><i data-icon="lightbulb"></i> 你會收到幾時嘅提醒？</div>
        <ul class="text-sm muted mt-1" style="list-style: disc; padding-left: 20px;">
          <li>今日：歡迎郵件 + 你的結果 PDF</li>
          <li>30 天后：1 個月自測，看看你升級咗未</li>
          <li>90 天后：3 個月自測 + 推薦新課程</li>
          <li>180 天后：6 個月自測 + 學員故事</li>
        </ul>
      </div>
    </section>
  </main>

  <footer class="footer">識講粵語 · 由 Vickey 老師主理</footer>

  <script src="js/common.js?v=20260607b"></script>
  <script src="js/labeler.js?v=20260607b"></script>
  <script>
    Cantonese.initTheme();
    Cantonese.injectThemeToggle();
    Cantonese.injectTopbar('test');
    Cantonese.initIcons();
    Cantonese.initScrollReveal();

    (async function () {
      const result = Cantonese.Store.get(Cantonese.Store.KEYS.result);
      if (!result) {
        document.getElementById('no-result').classList.remove('hide');
        document.getElementById('form-wrap').classList.add('hide');
        return;
      }

      const { level, mbtiCode } = result;
      await Labeller.load();
      const mbtiType = Labeller.resolve(mbtiCode);

      const badge = document.getElementById('level-badge');
      badge.textContent = level.short;
      badge.classList.add(level.cls);
      document.getElementById('level-name').textContent = level.name;
      document.getElementById('mbti-summary').textContent =
        `${mbtiCode} · ${mbtiType ? mbtiType.title : ''}`;

      const today = new Date().toISOString().split('T')[0];
      document.getElementById('startDate').value = today;

      const user = Cantonese.Store.get(Cantonese.Store.KEYS.user);
      if (user && user.email) document.querySelector('[name=email]').value = user.email;
      if (user && user.wechat) document.querySelector('[name=wechat]').value = user.wechat;

      document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const payload = {
          email: fd.get('email'),
          wechat: fd.get('wechat') || '',
          startDate: fd.get('startDate'),
          level: level.key,
          mbtiCode,
          user,
          result,
          source: 'signup.html',
          timestamp: Date.now(),
        };
        Cantonese.Store.set('cantonese_subscribe_payload', payload);

        let apiOk = false;
        try {
          const res = await fetch('/api/subscribe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          apiOk = res.ok;
        } catch (_) {
          apiOk = false;
        }

        document.getElementById('form-wrap').classList.add('hide');
        document.getElementById('success').classList.remove('hide');
        document.getElementById('success-msg').innerHTML = apiOk
          ? '已加入提醒名單 <i data-icon="check-circle" style="color: var(--green);"></i> 到期會自動發郵件俾你。'
          : '信息已保存（本地模式） <i data-icon="check-circle" style="color: var(--green);"></i> 上線後會同步到服務器。';
        Cantonese.confetti(document.body, 30);
      });
    })();
  </script>
</body>
</html>
