<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>開始測試 · 識講粵語</title>
  <link rel="stylesheet" href="css/style.css?v=20260607b">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <section class="section">
      <div id="quiz-container"></div>
    </section>
  </main>

  <script src="js/common.js?v=20260607b"></script>
  <script src="js/quiz.js?v=20260607b"></script>
  <script>
    Cantonese.initTheme();
    Cantonese.injectThemeToggle();
    Cantonese.injectTopbar('test');
    Cantonese.initIcons();
    Cantonese.initScrollReveal();

    // 捕獲邀請碼（?ref=XXXX），存 localStorage 讓 quiz 寫入 result
    const refParam = Cantonese.getQuery('ref');
    if (refParam && refParam !== 'reminder' && /^[A-Z0-9]{4,12}$/.test(refParam)) {
      Cantonese.Store.set('cantonese_referred_by', refParam);
    }

    // 已測過 → 直接跳到結果頁（除非是「重新測」或「郵件迴流」）
    const existing = Cantonese.Store.get(Cantonese.Store.KEYS.result);
    const isRestart = Cantonese.getQuery('restart') === '1';
    const isReminder = Cantonese.getQuery('ref') === 'reminder';
    if (existing && existing.level && !isRestart && !isReminder) {
      location.href = 'result.html';
    } else {
      Quiz.init(document.getElementById('quiz-container'));
    }
  </script>
</body>
</html>
